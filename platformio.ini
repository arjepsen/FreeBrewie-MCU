[env:mega2560_bare]
platform = atmelavr
board = brewie_atmega2560
framework =
build_flags =
  -std=gnu11
  -Wall
  -Wextra
  -Werror
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

build_unflags = -flto

; A) If you have a USBasp/ISP programmer:
upload_protocol = usbasp
upload_flags =
  -e
  -B
  10

; B) If you want to use the existing bootloader over USB-serial:
; upload_protocol = wiring
; upload_speed = 115200

monitor_speed = 115200